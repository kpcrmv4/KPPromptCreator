<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin Panel — KP Prompt Creator</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Noto+Sans+Thai:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
  <link rel="stylesheet" href="css/marketplace.css">
</head>
<body>
  <nav class="mp-navbar">
    <a href="/" class="nav-brand">
      <img src="images/logo.png" alt="KP">
      <span>KP Prompt Creator</span>
    </a>
    <div class="nav-links">
      <a href="/marketplace.html"><i class="bi bi-shop"></i> Marketplace</a>
      <a href="/"><i class="bi bi-magic"></i> สร้าง Prompt</a>
      <span class="user-menu" style="display:none;">
        <div class="nav-divider"></div>
        <a href="/topup.html" class="nav-wallet"><i class="bi bi-wallet2"></i> <span class="user-balance">฿0</span></a>
        <a href="/orders.html"><i class="bi bi-bag-check"></i> คำสั่งซื้อ</a>
        <a href="/dashboard.html" class="seller-only"><i class="bi bi-speedometer2"></i> Dashboard</a>
        <a href="/admin.html" class="active admin-only"><i class="bi bi-shield-lock"></i> Admin</a>
        <div class="nav-divider"></div>
        <a href="/account.html"><i class="bi bi-person-circle"></i></a>
        <a href="#" onclick="logout()" class="nav-logout"><i class="bi bi-box-arrow-right"></i></a>
      </span>
    </div>
  </nav>

  <div class="mp-container" id="admin-panel">
    <!-- Header -->
    <div class="admin-page-header">
      <div class="admin-header-content">
        <h1><i class="bi bi-shield-lock"></i> Admin Panel</h1>
        <p>จัดการระบบ Marketplace ทั้งหมด</p>
      </div>
    </div>

    <!-- Overview Stats -->
    <div id="admin-overview">
      <div class="loading-state"><div class="spinner"></div></div>
    </div>

    <!-- Admin Tabs -->
    <div class="admin-tabs">
      <button class="admin-tab active" data-tab="admin-tab-prompts">
        <i class="bi bi-collection"></i>
        <span>จัดการ Prompt</span>
      </button>
      <button class="admin-tab" data-tab="admin-tab-payouts">
        <i class="bi bi-cash-coin"></i>
        <span>คำขอถอนเงิน</span>
      </button>
      <button class="admin-tab" data-tab="admin-tab-users">
        <i class="bi bi-people"></i>
        <span>สมาชิก</span>
      </button>
      <button class="admin-tab" data-tab="admin-tab-notifications">
        <i class="bi bi-bell"></i>
        <span>แจ้งเตือน</span>
        <span id="admin-notif-badge" class="badge badge-danger" style="display:none;"></span>
      </button>
      <button class="admin-tab" data-tab="admin-tab-settings">
        <i class="bi bi-gear"></i>
        <span>ตั้งค่า</span>
      </button>
    </div>

    <!-- Tab: จัดการ Prompt -->
    <div class="admin-tab-content active" id="admin-tab-prompts">
      <div class="admin-section-card">
        <div class="admin-prompt-status-tabs">
          <button class="admin-status-tab active" onclick="loadAdminPromptsByStatus('pending');document.querySelectorAll('.admin-status-tab').forEach(t=>t.classList.remove('active'));this.classList.add('active')">
            <i class="bi bi-hourglass-split"></i> รออนุมัติ
          </button>
          <button class="admin-status-tab" onclick="loadAdminPromptsByStatus('approved');document.querySelectorAll('.admin-status-tab').forEach(t=>t.classList.remove('active'));this.classList.add('active')">
            <i class="bi bi-check-circle"></i> อนุมัติแล้ว
          </button>
          <button class="admin-status-tab" onclick="loadAdminPromptsByStatus('rejected');document.querySelectorAll('.admin-status-tab').forEach(t=>t.classList.remove('active'));this.classList.add('active')">
            <i class="bi bi-x-circle"></i> ปฏิเสธ
          </button>
        </div>
        <div id="admin-prompts">
          <div class="loading-state"><div class="spinner"></div></div>
        </div>
      </div>
    </div>

    <!-- Tab: คำขอถอนเงิน -->
    <div class="admin-tab-content" id="admin-tab-payouts">
      <div class="admin-section-card">
        <div id="admin-payouts">
          <div class="loading-state"><div class="spinner"></div></div>
        </div>
      </div>
    </div>

    <!-- Tab: จัดการสมาชิก -->
    <div class="admin-tab-content" id="admin-tab-users">
      <div class="admin-section-card">
        <div id="admin-users" class="mp-form">
          <div class="loading-state"><div class="spinner"></div></div>
        </div>
      </div>
    </div>

    <!-- Tab: แจ้งเตือน -->
    <div class="admin-tab-content" id="admin-tab-notifications">
      <div class="admin-section-card">
        <div id="admin-notifications">
          <div class="loading-state"><div class="spinner"></div></div>
        </div>
      </div>
    </div>

    <!-- Tab: ตั้งค่าระบบ -->
    <div class="admin-tab-content" id="admin-tab-settings">
      <div class="admin-section-card">
        <div id="admin-settings" class="mp-form">
          <div class="loading-state"><div class="spinner"></div></div>
        </div>
      </div>
    </div>
  </div>

  <script src="js/marketplace.js"></script>
</body>
</html>
