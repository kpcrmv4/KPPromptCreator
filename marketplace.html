<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Marketplace — KP Prompt Creator</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Noto+Sans+Thai:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
  <link rel="stylesheet" href="css/marketplace.css">
</head>
<body>
  <!-- Navbar -->
  <nav class="mp-navbar">
    <a href="/" class="nav-brand">
      <img src="images/logo.png" alt="KP">
      <span>KP Prompt Creator</span>
    </a>
    <div class="nav-links">
      <a href="/marketplace.html" class="active">Marketplace</a>
      <a href="/" >สร้าง Prompt</a>

      <!-- Not logged in -->
      <span class="auth-links">
        <a href="/auth.html">เข้าสู่ระบบ</a>
      </span>

      <!-- Logged in -->
      <span class="user-menu" style="display:none;">
        <a href="/topup.html"><i class="bi bi-wallet2"></i> <span class="user-balance">฿0</span></a>
        <a href="/orders.html"><i class="bi bi-bag"></i> คำสั่งซื้อ</a>
        <a href="/dashboard.html" class="seller-only">Dashboard</a>
        <a href="/admin.html" class="admin-only">Admin</a>
        <a href="/account.html"><i class="bi bi-person"></i></a>
        <a href="#" onclick="logout()"><i class="bi bi-box-arrow-right"></i></a>
      </span>
    </div>
  </nav>

  <div class="mp-container">
    <!-- Header -->
    <div class="mp-page-header">
      <h1><i class="bi bi-shop"></i> Prompt Marketplace</h1>
      <p>ซื้อ-ขาย AI Prompt คุณภาพสูง สำหรับทุกโปรเจค</p>
    </div>

    <!-- Filters -->
    <div class="mp-filters">
      <input type="text" id="filter-search" placeholder="ค้นหา Prompt..." onkeyup="if(event.key==='Enter')applyFilters()">
      <select id="filter-category" onchange="applyFilters()">
        <option value="">ทุกหมวดหมู่</option>
        <option value="web-app">Web Application</option>
        <option value="mobile-app">Mobile App</option>
        <option value="api">API / Backend</option>
        <option value="ecommerce">E-Commerce</option>
        <option value="dashboard">Dashboard</option>
        <option value="landing-page">Landing Page</option>
        <option value="automation">Automation</option>
        <option value="other">อื่นๆ</option>
      </select>
      <select id="filter-sort" onchange="applyFilters()">
        <option value="">ล่าสุด</option>
        <option value="popular">ยอดนิยม</option>
        <option value="rating">คะแนนสูงสุด</option>
        <option value="price_asc">ราคาน้อย → มาก</option>
        <option value="price_desc">ราคามาก → น้อย</option>
      </select>
      <button onclick="applyFilters()"><i class="bi bi-search"></i> ค้นหา</button>
    </div>

    <!-- Prompts Grid -->
    <div id="prompts-grid" class="prompts-grid">
      <div class="loading-state"><div class="spinner"></div><p>กำลังโหลด...</p></div>
    </div>

    <!-- Pagination -->
    <div id="pagination" class="pagination"></div>
  </div>

  <script src="js/marketplace.js"></script>
</body>
</html>
