<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>คอร์ส — KP Prompt Creator</title>
  <meta name="description" content="คอร์สเรียน Google Apps Script ครบจบ จาก zero สู่ deploy production">
  <meta property="og:title" content="GAS Mastery Course — KP Prompt Creator">
  <meta property="og:description" content="คอร์สเรียน Google Apps Script ครบจบ ฿999 ตลอดชีพ">
  <meta property="og:type" content="product">
  <meta property="og:image" content="https://kppromptcreator.tech/images/og-cover.png">
  <link rel="icon" href="/favicon.ico" sizes="any">
  <link rel="icon" href="/images/logo.png" type="image/png">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Noto+Sans+Thai:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/lucide@latest"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: { sans: ['Inter', 'Noto Sans Thai', 'sans-serif'] },
          colors: { brand: { indigo: '#6366f1', violet: '#8b5cf6' } },
        },
      },
    };
  </script>
  <link rel="stylesheet" href="css/marketplace.css">
  <style>
    body { font-family: 'Inter', 'Noto Sans Thai', sans-serif; }
    .logo-gradient { background: linear-gradient(135deg, #6366f1, #8b5cf6); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; }
    .hero-gradient { background: linear-gradient(135deg, #6366f1 0%, #8b5cf6 60%, #ec4899 100%); }
  </style>
</head>
<body class="min-h-screen bg-slate-50">
  <!-- Top nav -->
  <header class="sticky top-0 z-30 bg-white/95 backdrop-blur border-b border-slate-200">
    <div class="max-w-6xl mx-auto px-4 py-3 flex items-center justify-between">
      <a href="/index.html" class="flex items-center gap-2">
        <img src="/images/logo.png" alt="KP" class="h-8 w-8">
        <span class="font-bold text-lg logo-gradient">KP Prompt Creator</span>
      </a>
      <nav class="hidden md:flex items-center gap-1 text-sm">
        <a href="/marketplace.html" class="px-3 py-2 rounded-lg hover:bg-slate-100">Marketplace</a>
        <a href="/dashboard.html" class="px-3 py-2 rounded-lg hover:bg-slate-100">Dashboard</a>
        <a href="/account.html" class="px-3 py-2 rounded-lg hover:bg-slate-100" id="nav-account">บัญชี</a>
      </nav>
    </div>
  </header>

  <main class="max-w-6xl mx-auto px-4 py-8">
    <!-- Loading -->
    <div id="loading" class="text-center py-20">
      <div class="inline-block h-10 w-10 border-4 border-indigo-200 border-t-indigo-500 rounded-full animate-spin"></div>
      <p class="mt-3 text-slate-500">กำลังโหลดคอร์ส...</p>
    </div>

    <!-- Not found -->
    <div id="notfound" class="hidden text-center py-20">
      <i data-lucide="ghost" class="mx-auto h-12 w-12 text-slate-400"></i>
      <h2 class="mt-4 text-xl font-semibold text-slate-700">ไม่พบคอร์ส</h2>
      <a href="/marketplace.html" class="mt-4 inline-block px-4 py-2 bg-indigo-500 text-white rounded-lg">กลับหน้าหลัก</a>
    </div>

    <div id="content" class="hidden">
      <!-- Hero -->
      <section class="hero-gradient text-white rounded-2xl p-8 md:p-12 shadow-lg">
        <div class="grid md:grid-cols-3 gap-8 items-center">
          <div class="md:col-span-2">
            <div class="flex flex-wrap items-center gap-2 mb-3 text-sm">
              <span class="px-2.5 py-1 rounded-full bg-white/20 backdrop-blur" id="badge-level">all-levels</span>
              <span class="px-2.5 py-1 rounded-full bg-white/20 backdrop-blur" id="badge-hours"></span>
              <span class="px-2.5 py-1 rounded-full bg-white/20 backdrop-blur" id="badge-modules"></span>
            </div>
            <h1 id="title" class="text-3xl md:text-4xl font-bold leading-tight"></h1>
            <p id="subtitle" class="mt-3 text-white/90 text-lg"></p>
            <p id="description" class="mt-4 text-white/80 leading-relaxed"></p>
          </div>
          <div class="text-center md:text-right">
            <div class="text-white/80 text-sm mb-1">ราคา</div>
            <div class="text-4xl md:text-5xl font-bold mb-1">฿<span id="price">—</span></div>
            <div class="text-white/80 text-sm mb-6">เข้าถึงตลอดชีพ ไม่มีค่าใช้จ่ายเพิ่ม</div>

            <button id="cta-buy" class="hidden w-full md:w-auto px-6 py-3 bg-white text-indigo-600 font-semibold rounded-xl shadow hover:shadow-lg transition">
              🛒 ซื้อคอร์สนี้
            </button>
            <a id="cta-learn" href="#" class="hidden w-full md:w-auto px-6 py-3 bg-emerald-500 text-white font-semibold rounded-xl shadow hover:shadow-lg transition">
              ▶︎ เริ่มเรียน
            </a>
            <div id="cta-login" class="hidden text-sm">
              <a href="/auth.html" class="underline">เข้าสู่ระบบเพื่อซื้อ</a>
            </div>
          </div>
        </div>
      </section>

      <!-- Outline -->
      <section class="mt-10">
        <div class="flex items-center justify-between mb-6">
          <h2 class="text-2xl font-bold text-slate-900">เนื้อหาในคอร์ส</h2>
          <div class="text-sm text-slate-500">
            <span id="lesson-count">0</span> บทเรียน · <span id="module-count">0</span> หมวด
          </div>
        </div>
        <div id="modules-list" class="space-y-3"></div>
      </section>

      <!-- Tags -->
      <section class="mt-10">
        <h3 class="text-sm font-semibold text-slate-500 uppercase tracking-wide mb-3">หัวข้อที่ครอบคลุม</h3>
        <div id="tags-list" class="flex flex-wrap gap-2"></div>
      </section>
    </div>
  </main>

  <script>
    const params = new URLSearchParams(location.search);
    const slug = params.get('slug') || 'gas-mastery';

    function getToken() { return localStorage.getItem('kp_token'); }

    async function loadCourse() {
      const headers = {};
      const token = getToken();
      if (token) headers['Authorization'] = `Bearer ${token}`;

      const res = await fetch(`/api/courses/${slug}`, { headers });
      if (!res.ok) {
        document.getElementById('loading').classList.add('hidden');
        document.getElementById('notfound').classList.remove('hidden');
        lucide.createIcons();
        return;
      }
      const data = await res.json();
      render(data);
    }

    function render(data) {
      const { course, modules, enrolled } = data;

      document.title = course.title + ' — KP Prompt Creator';
      document.getElementById('title').textContent = course.title;
      document.getElementById('subtitle').textContent = course.subtitle || '';
      document.getElementById('description').textContent = course.description || '';
      document.getElementById('price').textContent = Number(course.price).toLocaleString();
      document.getElementById('badge-level').textContent = labelLevel(course.level);
      document.getElementById('badge-hours').textContent = course.estimated_hours ? `อ่านประมาณ ${course.estimated_hours} ชม.` : '';
      document.getElementById('badge-modules').textContent = `${course.total_modules} modules`;

      // Count lessons
      let totalLessons = 0;
      modules.forEach((m) => { totalLessons += (m.lessons || []).length; });
      document.getElementById('lesson-count').textContent = totalLessons;
      document.getElementById('module-count').textContent = modules.length;

      // CTA
      const token = getToken();
      const cta = {
        buy: document.getElementById('cta-buy'),
        learn: document.getElementById('cta-learn'),
        login: document.getElementById('cta-login'),
      };
      if (!token) {
        cta.login.classList.remove('hidden');
      } else if (enrolled) {
        cta.learn.classList.remove('hidden');
        cta.learn.href = `/course-learn.html?slug=${course.slug}`;
      } else {
        cta.buy.classList.remove('hidden');
        cta.buy.onclick = () => { location.href = `/course-buy.html?id=${course.id}`; };
      }

      // Modules
      const list = document.getElementById('modules-list');
      list.innerHTML = '';
      modules.forEach((m) => {
        const lessonItems = (m.lessons || []).map((l) => {
          const free = l.is_free_preview ? `<span class="ml-2 px-2 py-0.5 text-xs rounded-full bg-emerald-100 text-emerald-700">ฟรี</span>` : '';
          const mins = l.estimated_minutes ? `<span class="text-slate-400 text-xs ml-auto">${l.estimated_minutes} นาที</span>` : '';
          return `
            <a href="${enrolled || l.is_free_preview ? `/course-learn.html?slug=${course.slug}&lesson=${l.id}` : '#'}"
               class="flex items-center gap-3 py-2.5 px-3 rounded-lg hover:bg-slate-50 ${(!enrolled && !l.is_free_preview) ? 'cursor-default opacity-60' : ''}">
              <i data-lucide="${enrolled || l.is_free_preview ? 'play-circle' : 'lock'}" class="h-4 w-4 text-slate-400 flex-shrink-0"></i>
              <span class="text-sm text-slate-700">${escapeHtml(l.title)}</span>
              ${free}
              ${mins}
            </a>`;
        }).join('') || `<div class="px-3 py-2 text-sm text-slate-400 italic">ยังไม่มีบทเรียน — กำลังเพิ่มเนื้อหา</div>`;

        const detailsId = `m-${m.id}`;
        list.insertAdjacentHTML('beforeend', `
          <details class="bg-white rounded-xl border border-slate-200 group" ${m.sort_order === 1 ? 'open' : ''}>
            <summary class="flex items-center gap-3 p-4 cursor-pointer hover:bg-slate-50">
              <i data-lucide="chevron-right" class="h-5 w-5 text-slate-400 group-open:rotate-90 transition-transform"></i>
              <div class="flex-1">
                <div class="font-semibold text-slate-900">${escapeHtml(m.title)}</div>
                ${m.description ? `<div class="text-sm text-slate-500 mt-0.5">${escapeHtml(m.description)}</div>` : ''}
              </div>
              <span class="text-xs text-slate-400">${(m.lessons || []).length} บทเรียน</span>
            </summary>
            <div class="border-t border-slate-100 p-2">
              ${lessonItems}
            </div>
          </details>
        `);
      });

      // Tags
      const tagsEl = document.getElementById('tags-list');
      (course.tags || []).forEach((t) => {
        tagsEl.insertAdjacentHTML('beforeend',
          `<span class="px-3 py-1 text-xs rounded-full bg-slate-100 text-slate-700">${escapeHtml(t)}</span>`
        );
      });

      document.getElementById('loading').classList.add('hidden');
      document.getElementById('content').classList.remove('hidden');
      lucide.createIcons();
    }

    function labelLevel(l) {
      return { beginner: 'มือใหม่', intermediate: 'กลาง', advanced: 'สูง', 'all-levels': 'ทุกระดับ' }[l] || l;
    }
    function escapeHtml(s) {
      return String(s || '').replace(/[&<>"']/g, (m) => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;' }[m]));
    }

    loadCourse();
  </script>
</body>
</html>
