<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>เรียนคอร์ส — KP Prompt Creator</title>
  <meta name="robots" content="noindex">
  <link rel="icon" href="/favicon.ico" sizes="any">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Noto+Sans+Thai:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/lucide@latest"></script>
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: { sans: ['Inter', 'Noto Sans Thai', 'sans-serif'], mono: ['JetBrains Mono', 'monospace'] },
          colors: { brand: { indigo: '#6366f1', violet: '#8b5cf6' } },
        },
      },
    };
  </script>
  <style>
    body { font-family: 'Inter', 'Noto Sans Thai', sans-serif; }
    .mono { font-family: 'JetBrains Mono', monospace; }
    .prose-content h1, .prose-content h2, .prose-content h3 { font-weight: 700; color: #0f172a; margin: 1.5rem 0 0.75rem; }
    .prose-content h1 { font-size: 1.875rem; }
    .prose-content h2 { font-size: 1.5rem; }
    .prose-content h3 { font-size: 1.25rem; }
    .prose-content p { margin: 0.75rem 0; line-height: 1.75; color: #334155; }
    .prose-content ul, .prose-content ol { margin: 0.75rem 0 0.75rem 1.5rem; }
    .prose-content ul { list-style: disc; }
    .prose-content ol { list-style: decimal; }
    .prose-content li { margin: 0.25rem 0; line-height: 1.7; color: #334155; }
    .prose-content code:not(pre code) { background: #f1f5f9; padding: 0.125rem 0.375rem; border-radius: 0.25rem; font-family: 'JetBrains Mono', monospace; font-size: 0.875em; color: #4338ca; }
    .prose-content pre { background: #0f172a; color: #e2e8f0; padding: 1rem; border-radius: 0.5rem; overflow-x: auto; position: relative; }
    .code-copy-btn { position: absolute; top: 0.5rem; right: 0.5rem; font-size: 0.7rem; line-height: 1; background: rgba(148,163,184,0.18); color: #cbd5e1; border: 1px solid rgba(148,163,184,0.25); padding: 0.3rem 0.55rem; border-radius: 0.375rem; cursor: pointer; opacity: 0; transition: opacity 0.15s, background 0.15s; }
    .prose-content pre:hover .code-copy-btn, .code-copy-btn:focus { opacity: 1; }
    .code-copy-btn:hover { background: rgba(148,163,184,0.32); color: #fff; }
    @media (hover: none) { .code-copy-btn { opacity: 1; } }
    .prose-content blockquote { border-left: 3px solid #6366f1; padding-left: 1rem; margin: 1rem 0; color: #64748b; font-style: italic; }
    .prose-content a { color: #6366f1; text-decoration: underline; }
    .prose-content img { max-width: 100%; border-radius: 0.5rem; margin: 1rem 0; border: 1px solid #e2e8f0; }
    .prose-content hr { margin: 2rem 0; border-color: #e2e8f0; }
    .lesson-link.active { background: #eef2ff; color: #4338ca; font-weight: 600; }
    /* Quiz toggle: hide default disclosure marker, swap label on open/closed */
    details.quiz-details summary::-webkit-details-marker { display: none; }
    details.quiz-details summary { list-style: none; }
    details.quiz-details[open] .quiz-label-open { display: none; }
    details.quiz-details:not([open]) .quiz-label-close { display: none; }
    details.quiz-details[open] .quiz-chevron { transform: rotate(180deg); }
    .quiz-chevron { transition: transform 0.2s; }
  </style>
</head>
<body class="min-h-screen bg-slate-50">
  <header class="sticky top-0 z-30 bg-white border-b border-slate-200">
    <div class="px-4 py-3 flex items-center justify-between">
      <div class="flex items-center gap-3">
        <button id="toggle-sidebar" class="md:hidden p-2 -ml-2 rounded-lg hover:bg-slate-100">
          <i data-lucide="menu" class="h-5 w-5"></i>
        </button>
        <a href="/index.html" class="flex items-center gap-2">
          <img src="/images/logo.png" alt="KP" class="h-7 w-7">
          <span class="font-bold hidden sm:inline">KP Prompt Creator</span>
        </a>
        <span class="hidden sm:inline text-slate-300">/</span>
        <span id="course-title-header" class="hidden sm:inline text-sm text-slate-600 max-w-md truncate"></span>
      </div>
      <a href="/account.html" class="text-sm text-slate-600 hover:text-slate-900">บัญชี</a>
    </div>
    <div class="h-1 bg-slate-100">
      <div id="progress-bar" class="h-full bg-gradient-to-r from-indigo-500 to-violet-500" style="width: 0%"></div>
    </div>
  </header>

  <div id="loading" class="text-center py-20">
    <div class="inline-block h-10 w-10 border-4 border-indigo-200 border-t-indigo-500 rounded-full animate-spin"></div>
  </div>

  <div id="auth-required" class="hidden text-center py-20">
    <i data-lucide="lock" class="mx-auto h-10 w-10 text-slate-400"></i>
    <h2 class="mt-4 text-xl font-semibold text-slate-700">กรุณาเข้าสู่ระบบ</h2>
    <a href="/auth.html" class="mt-4 inline-block px-4 py-2 bg-indigo-500 text-white rounded-lg">ไปที่หน้า login</a>
  </div>

  <div id="not-enrolled" class="hidden text-center py-20 px-4">
    <i data-lucide="lock" class="mx-auto h-12 w-12 text-slate-400"></i>
    <h2 class="mt-4 text-xl font-semibold text-slate-700">คุณยังไม่ได้ลงทะเบียนคอร์สนี้</h2>
    <a id="buy-link" href="#" class="mt-4 inline-block px-6 py-3 bg-indigo-500 hover:bg-indigo-600 text-white font-semibold rounded-lg">ซื้อคอร์สเพื่อเริ่มเรียน</a>
  </div>

  <main id="layout" class="hidden flex">
    <!-- Sidebar -->
    <aside id="sidebar" class="hidden md:block w-80 bg-white border-r border-slate-200 sticky top-[3.5rem] h-[calc(100vh-3.5rem-4px)] overflow-y-auto">
      <div class="p-4 border-b border-slate-100">
        <div class="text-xs font-semibold text-slate-500 uppercase tracking-wide">หลักสูตร</div>
        <h2 id="course-title" class="font-bold text-slate-900 mt-1">—</h2>
      </div>
      <!-- Track filter -->
      <div class="p-3 border-b border-slate-100 bg-slate-50/50">
        <div class="text-[10px] font-semibold text-slate-500 uppercase tracking-wide mb-1.5">เส้นทาง</div>
        <div class="flex gap-1 text-xs" id="track-pills">
          <button class="track-pill flex-1 px-2 py-1.5 rounded-md font-medium transition" data-track="quick" title="Quick Path — พื้นฐาน + AI + Deploy">🚀 Quick</button>
          <button class="track-pill flex-1 px-2 py-1.5 rounded-md font-medium transition" data-track="core" title="แนะนำ — เข้าใจ pattern เต็ม">✓ แนะนำ</button>
          <button class="track-pill flex-1 px-2 py-1.5 rounded-md font-medium transition" data-track="all" title="ทั้งหมด">📚 ทั้งหมด</button>
        </div>
      </div>
      <nav id="outline" class="p-2"></nav>
    </aside>
    <style>
      .track-pill { color: #64748b; background: #fff; border: 1px solid #e2e8f0; }
      .track-pill:hover { background: #f1f5f9; }
      .track-pill.active { background: linear-gradient(135deg, #6366f1, #8b5cf6); color: white; border-color: transparent; }
    </style>

    <!-- Content -->
    <article class="flex-1 min-w-0 px-4 md:px-10 py-8 max-w-4xl mx-auto">
      <div id="lesson-empty" class="hidden text-center py-20">
        <i data-lucide="book-open" class="mx-auto h-12 w-12 text-slate-300"></i>
        <h3 class="mt-4 text-lg font-semibold text-slate-700">เลือกบทเรียนจากด้านซ้าย</h3>
        <p class="mt-2 text-sm text-slate-500">หรือเริ่มจากบทแรก</p>
      </div>

      <div id="lesson-content" class="hidden">
        <div class="mb-2 text-xs font-semibold text-indigo-600 uppercase tracking-wide" id="lesson-module">—</div>
        <h1 id="lesson-title" class="text-3xl font-bold text-slate-900">—</h1>
        <p id="lesson-summary" class="mt-2 text-slate-600"></p>
        <div class="mt-4 flex items-center gap-2 text-xs text-slate-500">
          <i data-lucide="clock" class="h-3.5 w-3.5"></i>
          <span id="lesson-time">—</span>
        </div>

        <hr class="my-6 border-slate-200">

        <div id="lesson-md" class="prose-content"></div>

        <!-- Code snippets -->
        <div id="lesson-snippets" class="mt-8 space-y-4"></div>

        <!-- Image gallery -->
        <div id="lesson-images" class="mt-8 space-y-4"></div>

        <!-- Quiz -->
        <div id="lesson-quiz" class="mt-10"></div>

        <!-- Nav -->
        <div class="mt-12 flex items-center justify-between border-t border-slate-200 pt-6">
          <button id="prev-lesson" class="px-4 py-2 rounded-lg border border-slate-300 text-slate-700 hover:bg-slate-50 disabled:opacity-30 disabled:cursor-not-allowed">← ก่อนหน้า</button>
          <button id="mark-complete" class="hidden px-4 py-2 rounded-lg bg-emerald-500 hover:bg-emerald-600 text-white font-medium">
            ✓ เรียนจบบทนี้
          </button>
          <button id="next-lesson" class="px-4 py-2 rounded-lg bg-indigo-500 hover:bg-indigo-600 text-white font-medium disabled:opacity-30 disabled:cursor-not-allowed">ต่อไป →</button>
        </div>
      </div>
    </article>
  </main>

  <script>
    const params = new URLSearchParams(location.search);
    const slug = params.get('slug') || 'gas-mastery';
    let lessonId = params.get('lesson');

    function getToken() { return localStorage.getItem('kp_token'); }

    let courseData = null;
    let allLessons = [];

    // --- Track filter (Quick / Core / All) ---
    function getTrack() {
      const saved = localStorage.getItem('kp_course_track');
      return ['quick', 'core', 'all'].includes(saved) ? saved : 'core';
    }
    function setTrack(t) { localStorage.setItem('kp_course_track', t); }
    function lessonInTrack(l, track) {
      if (track === 'all') return true;
      if (track === 'core') return !!l.is_core;
      if (track === 'quick') return !!l.is_quick_path;
      return true;
    }
    function wireTrackPills() {
      const cur = getTrack();
      document.querySelectorAll('#track-pills .track-pill').forEach((btn) => {
        btn.classList.toggle('active', btn.dataset.track === cur);
        btn.onclick = () => {
          setTrack(btn.dataset.track);
          document.querySelectorAll('#track-pills .track-pill').forEach((b) =>
            b.classList.toggle('active', b.dataset.track === btn.dataset.track)
          );
          renderSidebar();
          // ถ้าเปิดบทอยู่ — reload เพื่อ refresh prev/next ตาม track ใหม่
          if (lessonId) loadLesson(lessonId, { skipScroll: true });
        };
      });
    }

    async function init() {
      const token = getToken();

      const headers = token ? { Authorization: `Bearer ${token}` } : {};
      const res = await fetch(`/api/courses/${slug}`, { headers });
      if (!res.ok) {
        document.getElementById('loading').classList.add('hidden');
        document.getElementById('auth-required').classList.remove('hidden');
        lucide.createIcons();
        return;
      }
      courseData = await res.json();

      // Build flat lesson array
      courseData.modules.forEach((m) => {
        (m.lessons || []).forEach((l) => allLessons.push({ ...l, module_title: m.title }));
      });

      // Check access — admin bypasses enrollment gate
      const hasFullAccess = courseData.enrolled || courseData.is_admin;
      if (!hasFullAccess) {
        const freeLesson = allLessons.find((l) => l.is_free_preview);
        if (lessonId) {
          const target = allLessons.find((l) => l.id === lessonId);
          if (!target || !target.is_free_preview) return showNotEnrolled();
        } else if (!freeLesson) {
          return showNotEnrolled();
        }
      }

      document.getElementById('course-title').textContent = courseData.course.title;
      document.getElementById('course-title-header').textContent = courseData.course.title;

      wireTrackPills();
      renderSidebar();
      renderProgress();

      // Default lesson — ถ้าผู้ใช้ใหม่ → บทแรกของ track ปัจจุบัน
      if (!lessonId) {
        const track = getTrack();
        const firstInTrack = allLessons.find((l) => lessonInTrack(l, track));
        lessonId = courseData.last_lesson_id || firstInTrack?.id || allLessons[0]?.id;
      }
      if (lessonId) {
        loadLesson(lessonId, { skipScroll: true });
      } else {
        showEmpty();
      }

      document.getElementById('loading').classList.add('hidden');
      document.getElementById('layout').classList.remove('hidden');
      document.getElementById('layout').classList.add('flex');
      lucide.createIcons();
    }

    function showNotEnrolled() {
      document.getElementById('loading').classList.add('hidden');
      document.getElementById('not-enrolled').classList.remove('hidden');
      document.getElementById('buy-link').href = `/course-detail.html?slug=${slug}`;
      lucide.createIcons();
    }

    function showEmpty() {
      document.getElementById('lesson-content').classList.add('hidden');
      document.getElementById('lesson-empty').classList.remove('hidden');
    }

    function renderSidebar() {
      const el = document.getElementById('outline');
      el.innerHTML = '';
      const hasFullAccess = courseData.enrolled || courseData.is_admin;
      const track = getTrack();

      // กรอง modules + lessons ตาม track — แต่บทที่กำลังเปิดอยู่ต้องโผล่เสมอ
      const filtered = courseData.modules
        .map((m) => ({
          ...m,
          lessons: (m.lessons || []).filter((l) => lessonInTrack(l, track) || l.id === lessonId),
        }))
        .filter((m) => m.lessons.length > 0);

      if (filtered.length === 0) {
        el.insertAdjacentHTML('beforeend',
          `<div class="p-4 text-sm text-slate-500 italic">ไม่มีบทเรียนใน track นี้</div>`
        );
        return;
      }

      filtered.forEach((m) => {
        const lessonsHtml = m.lessons.map((l) => {
          const num = `${m.sort_order}.${l.sort_order}`;
          const free = l.is_free_preview ? ` <span class="text-emerald-500 text-xs">ฟรี</span>` : '';
          const quick = l.is_quick_path ? ` <span class="text-indigo-500 text-xs">🚀</span>` : '';
          const adminBadge = (courseData.is_admin && !l.is_published) ? ` <span class="text-amber-500 text-xs">draft</span>` : '';
          const offTrack = !lessonInTrack(l, track);
          const offTrackBadge = offTrack ? ` <span class="text-slate-400 text-[10px] italic">(นอก track)</span>` : '';
          const locked = (!hasFullAccess && !l.is_free_preview);
          return `
            <a href="?slug=${slug}&lesson=${l.id}" data-lesson-id="${l.id}"
               class="lesson-link flex items-baseline gap-2 px-3 py-2 rounded-lg text-sm text-slate-700 hover:bg-slate-50 ${locked ? 'opacity-50 cursor-not-allowed' : ''} ${offTrack ? 'opacity-70' : ''}">
              <span class="mono text-xs text-slate-400 font-semibold tabular-nums w-9 flex-shrink-0">${num}</span>
              <span class="flex-1">${escapeHtml(l.title)}</span>${quick}${free}${adminBadge}${offTrackBadge}
            </a>`;
        }).join('');

        el.insertAdjacentHTML('beforeend', `
          <details ${m.sort_order === 1 ? 'open' : ''} class="mb-2">
            <summary class="px-3 py-2 text-sm font-semibold text-slate-900 cursor-pointer hover:bg-slate-50 rounded-lg list-none flex items-center gap-2">
              <i data-lucide="chevron-right" class="h-4 w-4 transition-transform"></i>
              <span class="flex-1">${escapeHtml(m.title)}</span>
              <span class="text-xs text-slate-400 font-normal">${m.lessons.length}</span>
            </summary>
            <div class="ml-4 mt-1">${lessonsHtml}</div>
          </details>
        `);
      });
      // highlight active lesson
      document.querySelectorAll('.lesson-link').forEach((a) => {
        a.classList.toggle('active', a.dataset.lessonId === lessonId);
      });
      lucide.createIcons();
    }

    function renderProgress() {
      const pct = courseData.progress_pct || 0;
      document.getElementById('progress-bar').style.width = pct + '%';
    }

    async function loadLesson(id, opts = {}) {
      lessonId = id;
      // update URL without reload
      const u = new URL(location.href);
      u.searchParams.set('lesson', id);
      history.replaceState(null, '', u.toString());

      // highlight in sidebar
      document.querySelectorAll('.lesson-link').forEach((a) => {
        a.classList.toggle('active', a.dataset.lessonId === id);
      });

      const token = getToken();
      const headers = token ? { Authorization: `Bearer ${token}` } : {};
      const track = getTrack();
      const res = await fetch(`/api/lessons/${id}?track=${encodeURIComponent(track)}`, { headers });

      if (!res.ok) {
        const err = await res.json().catch(() => ({}));
        if (res.status === 403) return showNotEnrolled();
        alert('โหลดบทเรียนไม่สำเร็จ: ' + (err.error || res.status));
        return;
      }
      const data = await res.json();
      renderLesson(data);
      if (!opts.skipScroll) window.scrollTo({ top: 0, behavior: 'smooth' });
    }

    function renderLesson(data) {
      const l = data.lesson;
      document.getElementById('lesson-empty').classList.add('hidden');
      document.getElementById('lesson-content').classList.remove('hidden');

      const m = courseData.modules.find((mm) => mm.id === l.module_id);
      const num = m ? `${m.sort_order}.${l.sort_order}` : '';
      document.getElementById('lesson-module').textContent = m ? `${m.title} · บทที่ ${num}` : '';
      document.getElementById('lesson-title').textContent = l.title;
      document.getElementById('lesson-summary').textContent = l.summary || '';
      document.getElementById('lesson-time').textContent = l.estimated_minutes ? `${l.estimated_minutes} นาที` : '';

      // Markdown
      const md = l.content_md || '_เนื้อหากำลังเตรียม_';
      document.getElementById('lesson-md').innerHTML = marked.parse(md);
      addInlineCopyButtons();

      // Code snippets — โชว์เฉพาะที่ "ไม่ซ้ำ" กับโค้ดในเนื้อหา
      // (เนื้อหามีปุ่มคัดลอก inline แล้ว; capstone "ไฟล์เต็ม" ที่ไม่ได้อยู่ในเนื้อหาจะยังโชว์ที่นี่)
      const snippetsEl = document.getElementById('lesson-snippets');
      snippetsEl.innerHTML = '';
      const mdNorm = (md || '').replace(/\s+/g, '');
      const snippets = (l.code_snippets || []).filter((s) => {
        const codeNorm = (s.code || '').replace(/\s+/g, '');
        return codeNorm.length > 0 && !mdNorm.includes(codeNorm);
      });
      window.__snippets__ = snippets;
      if (snippets.length) {
        snippetsEl.insertAdjacentHTML('beforeend',
          '<h3 class="text-sm font-semibold text-slate-500 uppercase tracking-wide">📦 ไฟล์เต็ม (กดคัดลอกได้)</h3>');
      }
      snippets.forEach((s, idx) => {
        snippetsEl.insertAdjacentHTML('beforeend', `
          <div class="bg-slate-900 rounded-lg overflow-hidden">
            <div class="flex items-center justify-between px-4 py-2 bg-slate-800 text-slate-300 text-xs">
              <span class="font-semibold">${escapeHtml(s.title || s.language || 'Snippet')}</span>
              <button onclick="copySnippet(${idx})" class="hover:text-white">📋 คัดลอก</button>
            </div>
            <pre class="p-4 text-sm text-slate-100 overflow-x-auto mono"><code id="snippet-${idx}">${escapeHtml(s.code || '')}</code></pre>
          </div>
        `);
      });

      // Images
      const imagesEl = document.getElementById('lesson-images');
      imagesEl.innerHTML = '';
      (l.image_urls || []).forEach((url) => {
        imagesEl.insertAdjacentHTML('beforeend', `<img src="${escapeHtml(url)}" class="w-full rounded-lg border border-slate-200">`);
      });

      // Quiz
      renderQuiz(l.quiz || []);
      lucide.createIcons();

      // Nav buttons
      const prev = document.getElementById('prev-lesson');
      const next = document.getElementById('next-lesson');
      prev.disabled = !data.navigation.prev_lesson_id;
      next.disabled = !data.navigation.next_lesson_id;
      prev.onclick = () => loadLesson(data.navigation.prev_lesson_id);
      next.onclick = () => loadLesson(data.navigation.next_lesson_id);

      window.scrollTo({ top: 0, behavior: 'smooth' });
    }

    function copySnippet(idx) {
      const s = (window.__snippets__ || [])[idx];
      if (!s?.code) return;
      navigator.clipboard.writeText(s.code).then(() => {
        // Brief toast
        const t = document.createElement('div');
        t.className = 'fixed bottom-6 right-6 bg-slate-900 text-white px-4 py-2 rounded-lg shadow-lg z-50';
        t.textContent = '✅ คัดลอกแล้ว';
        document.body.appendChild(t);
        setTimeout(() => t.remove(), 1500);
      });
    }

    // เติมปุ่มคัดลอกให้ทุก code block ที่อยู่ "ในเนื้อหา" (markdown ```...```)
    function addInlineCopyButtons() {
      document.querySelectorAll('#lesson-md pre').forEach((pre) => {
        if (pre.querySelector('.code-copy-btn')) return;
        const codeEl = pre.querySelector('code');
        const code = (codeEl ? codeEl.textContent : pre.textContent) || '';
        if (!code.trim()) return;
        const btn = document.createElement('button');
        btn.type = 'button';
        btn.className = 'code-copy-btn';
        btn.textContent = '📋 คัดลอก';
        btn.addEventListener('click', () => {
          navigator.clipboard.writeText(code).then(() => {
            btn.textContent = '✅ คัดลอกแล้ว';
            setTimeout(() => { btn.textContent = '📋 คัดลอก'; }, 1500);
          });
        });
        pre.appendChild(btn);
      });
    }

    function renderQuiz(quiz) {
      const el = document.getElementById('lesson-quiz');
      if (!quiz || quiz.length === 0) { el.innerHTML = ''; return; }

      el.innerHTML = `
        <div class="border-t border-slate-200 pt-8">
          <details class="quiz-details group">
            <summary class="list-none cursor-pointer select-none">
              <div class="flex items-center justify-between bg-gradient-to-r from-indigo-50 to-violet-50 hover:from-indigo-100 hover:to-violet-100 border border-indigo-200 rounded-xl px-5 py-4 transition">
                <div class="flex items-center gap-3">
                  <span class="text-2xl">💡</span>
                  <div>
                    <div class="font-bold text-slate-900">ลองตอบดู</div>
                    <div class="text-xs text-slate-500">${quiz.length} ข้อ · ไม่บันทึกคะแนน คลิกคำตอบเพื่อดูเฉลย</div>
                  </div>
                </div>
                <div class="flex items-center gap-2 text-indigo-600">
                  <span class="text-sm font-medium quiz-label-open">เปิด</span>
                  <span class="text-sm font-medium quiz-label-close">ปิด</span>
                  <i data-lucide="chevron-down" class="quiz-chevron h-5 w-5"></i>
                </div>
              </div>
            </summary>
            <div class="space-y-6 mt-4" id="quiz-list"></div>
          </details>
        </div>
      `;

      const list = document.getElementById('quiz-list');
      quiz.forEach((q, qIdx) => {
        const choicesHtml = (q.choices || []).map((choice, cIdx) => `
          <button
            type="button"
            data-q="${qIdx}" data-c="${cIdx}"
            onclick="selectAnswer(${qIdx}, ${cIdx})"
            class="quiz-choice w-full text-left px-4 py-3 rounded-lg border border-slate-200 bg-white hover:border-indigo-400 hover:bg-indigo-50 transition mb-2 flex items-start gap-3"
          >
            <span class="flex-shrink-0 w-7 h-7 rounded-full bg-slate-100 text-slate-600 flex items-center justify-center font-semibold text-sm">${String.fromCharCode(65 + cIdx)}</span>
            <span class="flex-1 text-slate-700">${escapeHtml(choice)}</span>
            <span class="quiz-mark hidden flex-shrink-0"></span>
          </button>
        `).join('');

        list.insertAdjacentHTML('beforeend', `
          <div class="bg-slate-50 rounded-xl p-5" data-quiz-card="${qIdx}">
            <div class="font-semibold text-slate-900 mb-4">
              <span class="text-indigo-600">Q${qIdx + 1}.</span> ${escapeHtml(q.q)}
            </div>
            <div class="space-y-1">${choicesHtml}</div>
            <div class="quiz-explanation hidden mt-4 p-3 rounded-lg bg-blue-50 border border-blue-200 text-sm text-blue-900"></div>
          </div>
        `);
      });

      window.__quiz__ = quiz;
    }

    function selectAnswer(qIdx, cIdx) {
      const quiz = (window.__quiz__ || [])[qIdx];
      if (!quiz) return;

      const card = document.querySelector(`[data-quiz-card="${qIdx}"]`);
      const buttons = card.querySelectorAll('.quiz-choice');
      const isCorrect = cIdx === quiz.correct;

      // Reset all buttons in this question
      buttons.forEach((btn) => {
        btn.disabled = false;
        btn.classList.remove('border-emerald-400', 'bg-emerald-50', 'border-red-400', 'bg-red-50', 'opacity-60');
        const mark = btn.querySelector('.quiz-mark');
        if (mark) { mark.classList.add('hidden'); mark.textContent = ''; }
      });

      // Mark all buttons disabled after answer + highlight correct + selected
      buttons.forEach((btn) => {
        const c = Number(btn.dataset.c);
        btn.disabled = true;
        if (c === quiz.correct) {
          btn.classList.add('border-emerald-400', 'bg-emerald-50');
          const mark = btn.querySelector('.quiz-mark');
          mark.classList.remove('hidden');
          mark.textContent = '✓';
          mark.className = 'quiz-mark flex-shrink-0 text-emerald-600 font-bold';
        } else if (c === cIdx) {
          btn.classList.add('border-red-400', 'bg-red-50');
          const mark = btn.querySelector('.quiz-mark');
          mark.classList.remove('hidden');
          mark.textContent = '✕';
          mark.className = 'quiz-mark flex-shrink-0 text-red-600 font-bold';
        } else {
          btn.classList.add('opacity-60');
        }
      });

      // Show explanation
      const explanationEl = card.querySelector('.quiz-explanation');
      if (quiz.explain) {
        const prefix = isCorrect
          ? '<b class="text-emerald-700">✓ ถูกต้อง</b> — '
          : '<b class="text-red-700">✕ ลองอีกครั้งดูสิ</b> — ';
        explanationEl.innerHTML = prefix + escapeHtml(quiz.explain);
        explanationEl.classList.remove('hidden');
      }
    }

    function escapeHtml(s) {
      return String(s || '').replace(/[&<>"']/g, (m) => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;' }[m]));
    }

    // Sidebar toggle (mobile)
    document.getElementById('toggle-sidebar').addEventListener('click', () => {
      document.getElementById('sidebar').classList.toggle('hidden');
    });

    init();
  </script>
</body>
</html>
