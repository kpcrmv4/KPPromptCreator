<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>เข้าสู่ระบบ — KP Prompt Creator</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Noto+Sans+Thai:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
  <link rel="stylesheet" href="css/marketplace.css">
</head>
<body>
  <nav class="mp-navbar">
    <a href="/" class="nav-brand">
      <img src="images/logo.png" alt="KP">
      <span>KP Prompt Creator</span>
    </a>
    <div class="nav-links">
      <a href="/marketplace.html"><i class="bi bi-shop"></i> Marketplace</a>
      <a href="/"><i class="bi bi-magic"></i> สร้าง Prompt</a>
    </div>
  </nav>

  <div class="mp-container-sm" style="margin-top: 2rem;">
    <div class="mp-form">
      <!-- Tabs -->
      <div class="auth-tabs">
        <button class="auth-tab active" onclick="showAuthTab('login')">เข้าสู่ระบบ</button>
        <button class="auth-tab" onclick="showAuthTab('register')">สมัครสมาชิก</button>
      </div>

      <!-- Login Form -->
      <form id="login-form" onsubmit="handleLogin(event)">
        <div class="form-group">
          <label>อีเมล</label>
          <input type="email" name="email" required placeholder="your@email.com">
        </div>
        <div class="form-group">
          <label>รหัสผ่าน</label>
          <input type="password" name="password" required placeholder="รหัสผ่าน">
        </div>
        <button type="submit" class="btn btn-primary btn-lg" style="width:100%">เข้าสู่ระบบ</button>
      </form>

      <!-- Register Form -->
      <form id="register-form" style="display:none" onsubmit="handleRegister(event)">
        <div class="form-group">
          <label>ชื่อที่แสดง</label>
          <input type="text" name="display_name" required placeholder="ชื่อของคุณ">
        </div>
        <div class="form-group">
          <label>อีเมล</label>
          <input type="email" name="email" required placeholder="your@email.com">
        </div>
        <div class="form-group">
          <label>รหัสผ่าน</label>
          <input type="password" name="password" required minlength="6" placeholder="อย่างน้อย 6 ตัวอักษร">
        </div>
        <div class="form-group">
          <label>ประเภทบัญชี</label>
          <select name="role">
            <option value="buyer">ผู้ซื้อ (Buyer)</option>
            <option value="seller">ผู้ขาย (Seller)</option>
          </select>
        </div>
        <button type="submit" class="btn btn-primary btn-lg" style="width:100%">สมัครสมาชิก</button>
      </form>
    </div>
  </div>

  <script src="js/marketplace.js"></script>
  <script>
    function showAuthTab(tab) {
      document.querySelectorAll('.auth-tab').forEach(t => t.classList.remove('active'));
      event.target.classList.add('active');
      document.getElementById('login-form').style.display = tab === 'login' ? '' : 'none';
      document.getElementById('register-form').style.display = tab === 'register' ? '' : 'none';
    }
  </script>
</body>
</html>
