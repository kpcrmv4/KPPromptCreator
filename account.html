<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>บัญชีของฉัน — KP Prompt Creator</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Noto+Sans+Thai:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
  <link rel="stylesheet" href="css/marketplace.css">
</head>
<body>
  <nav class="mp-navbar">
    <a href="/" class="nav-brand"><img src="images/logo.png" alt="KP"><span>KP Prompt Creator</span></a>
    <div class="nav-links">
      <a href="/marketplace.html"><i class="bi bi-shop"></i> Marketplace</a>
      <a href="/"><i class="bi bi-magic"></i> สร้าง Prompt</a>
      <span class="user-menu" style="display:none;">
        <div class="nav-divider"></div>
        <a href="/topup.html" class="nav-wallet"><i class="bi bi-wallet2"></i> <span class="user-balance">฿0</span></a>
        <a href="/orders.html"><i class="bi bi-bag-check"></i> คำสั่งซื้อ</a>
        <a href="/dashboard.html" class="seller-only"><i class="bi bi-speedometer2"></i> Dashboard</a>
        <a href="/admin.html" class="admin-only"><i class="bi bi-shield-lock"></i> Admin</a>
        <div class="nav-divider"></div>
        <a href="/account.html" class="active"><i class="bi bi-person-circle"></i></a>
        <a href="#" onclick="logout()" class="nav-logout"><i class="bi bi-box-arrow-right"></i></a>
      </span>
    </div>
  </nav>

  <div class="mp-container-sm" style="margin-top: 2rem;">
    <div class="mp-page-header">
      <h1><i class="bi bi-person-circle"></i> บัญชีของฉัน</h1>
    </div>

    <div class="mp-form" id="account-form">
      <div class="loading-state"><div class="spinner"></div></div>
    </div>

    <div class="mp-form" style="margin-top:1.5rem;">
      <h3>เปลี่ยนรหัสผ่าน</h3>
      <form onsubmit="handleChangePassword(event)">
        <div class="form-group">
          <label>รหัสผ่านปัจจุบัน</label>
          <input type="password" name="current_password" required>
        </div>
        <div class="form-group">
          <label>รหัสผ่านใหม่</label>
          <input type="password" name="new_password" required minlength="6">
        </div>
        <button type="submit" class="btn btn-primary" style="width:100%">เปลี่ยนรหัสผ่าน</button>
      </form>
    </div>
  </div>

  <script src="js/marketplace.js"></script>
</body>
</html>
