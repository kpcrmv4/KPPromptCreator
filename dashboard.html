<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Seller Dashboard — KP Prompt Creator</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Noto+Sans+Thai:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
  <link rel="stylesheet" href="css/marketplace.css">
</head>
<body>
  <nav class="mp-navbar">
    <a href="/" class="nav-brand">
      <img src="images/logo.png" alt="KP">
      <span>KP Prompt Creator</span>
    </a>
    <div class="nav-links">
      <a href="/marketplace.html">Marketplace</a>
      <a href="/">สร้าง Prompt</a>
      <span class="user-menu" style="display:none;">
        <a href="/topup.html"><i class="bi bi-wallet2"></i> <span class="user-balance">฿0</span></a>
        <a href="/dashboard.html" class="active seller-only">Dashboard</a>
        <a href="/admin.html" class="admin-only">Admin</a>
        <a href="#" onclick="logout()"><i class="bi bi-box-arrow-right"></i></a>
      </span>
    </div>
  </nav>

  <div class="mp-container" id="seller-dashboard">
    <div class="mp-page-header">
      <h1><i class="bi bi-speedometer2"></i> Seller Dashboard</h1>
      <p>จัดการ Prompt และดูยอดขายของคุณ</p>
    </div>

    <!-- Stats -->
    <div class="stats-grid">
      <div class="stat-card">
        <div class="stat-value" id="stat-prompts">0</div>
        <div class="stat-label">Prompt ทั้งหมด</div>
      </div>
      <div class="stat-card">
        <div class="stat-value" id="stat-approved">0</div>
        <div class="stat-label">อนุมัติแล้ว</div>
      </div>
      <div class="stat-card">
        <div class="stat-value" id="stat-sales">0</div>
        <div class="stat-label">ยอดขาย</div>
      </div>
      <div class="stat-card">
        <div class="stat-value" id="stat-revenue">฿0</div>
        <div class="stat-label">รายได้สุทธิ</div>
      </div>
      <div class="stat-card">
        <div class="stat-value" id="stat-balance">฿0</div>
        <div class="stat-label">เครดิตคงเหลือ</div>
      </div>
    </div>

    <!-- Create Prompt -->
    <div style="margin-bottom: 2rem;">
      <h2><i class="bi bi-plus-circle"></i> สร้าง Prompt ใหม่</h2>
      <div class="mp-form">
        <form onsubmit="handleCreatePrompt(event)">
          <div class="form-group">
            <label>ชื่อ Prompt *</label>
            <input type="text" name="title" required placeholder="เช่น E-Commerce Next.js + Supabase">
          </div>
          <div class="form-group">
            <label>รายละเอียด *</label>
            <textarea name="description" required placeholder="อธิบายว่า Prompt นี้ทำอะไรได้บ้าง..."></textarea>
          </div>
          <div class="form-group">
            <label>หมวดหมู่ *</label>
            <select name="category" required>
              <option value="web-app">Web Application</option>
              <option value="mobile-app">Mobile App</option>
              <option value="api">API / Backend</option>
              <option value="ecommerce">E-Commerce</option>
              <option value="dashboard">Dashboard</option>
              <option value="landing-page">Landing Page</option>
              <option value="automation">Automation</option>
              <option value="other">อื่นๆ</option>
            </select>
          </div>
          <div class="form-group">
            <label>ราคา (บาท) *</label>
            <input type="number" name="price" required min="0" step="1" placeholder="เช่น 50">
          </div>
          <div class="form-group">
            <label>Tech Stack (คั่นด้วย ,)</label>
            <input type="text" name="tech_stack" placeholder="เช่น Next.js, Supabase, Tailwind">
          </div>
          <div class="form-group">
            <label>Tags (คั่นด้วย ,)</label>
            <input type="text" name="tags" placeholder="เช่น ecommerce, fullstack, responsive">
          </div>
          <div class="form-group">
            <label>ตัวอย่างสั้นๆ (แสดงหน้า listing)</label>
            <textarea name="preview_text" rows="3" placeholder="ตัวอย่างบางส่วนของ Prompt..."></textarea>
          </div>
          <div class="form-group">
            <label>เนื้อหา Prompt จริง *</label>
            <textarea name="prompt_content" required rows="10" placeholder="เนื้อหา Prompt เต็ม (ผู้ซื้อจะเห็นหลังซื้อ)..."></textarea>
          </div>
          <div class="form-group">
            <label>Demo URL</label>
            <input type="url" name="demo_url" placeholder="https://example.com">
          </div>
          <button type="submit" class="btn btn-primary btn-lg" style="width:100%">
            <i class="bi bi-cloud-upload"></i> ส่ง Prompt (รออนุมัติ)
          </button>
        </form>
      </div>
    </div>

    <!-- My Prompts -->
    <h2><i class="bi bi-collection"></i> Prompt ของฉัน</h2>
    <div class="mp-form">
      <table class="data-table">
        <thead>
          <tr><th>ชื่อ</th><th>ราคา</th><th>สถานะ</th><th>ยอดขาย</th><th>คะแนน</th><th></th></tr>
        </thead>
        <tbody id="seller-prompts">
          <tr><td colspan="6" class="loading-state"><div class="spinner"></div></td></tr>
        </tbody>
      </table>
    </div>

    <!-- Payout -->
    <div style="margin-top: 2rem;">
      <h2><i class="bi bi-cash-stack"></i> ถอนเงิน</h2>
      <div class="mp-form">
        <form onsubmit="handlePayoutRequest(event)">
          <div class="form-group">
            <label>จำนวนเงิน (บาท)</label>
            <input type="number" name="amount" required min="100" step="1" placeholder="ขั้นต่ำ 100 บาท">
          </div>
          <div class="form-group">
            <label>เบอร์ TrueMoney รับเงิน</label>
            <input type="text" name="payment_account" required placeholder="09xxxxxxxx">
          </div>
          <button type="submit" class="btn btn-primary" style="width:100%">
            <i class="bi bi-send"></i> ส่งคำขอถอนเงิน
          </button>
        </form>
      </div>
    </div>
  </div>

  <script src="js/marketplace.js"></script>
</body>
</html>
