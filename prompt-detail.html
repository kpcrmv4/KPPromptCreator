<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Prompt Detail — KP Prompt Creator</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Noto+Sans+Thai:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/lucide@latest"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: {
            sans: ['Inter', 'Noto Sans Thai', 'sans-serif'],
          },
          colors: {
            brand: {
              indigo: '#6366f1',
              violet: '#8b5cf6',
            }
          }
        }
      }
    }
  </script>
  <link rel="stylesheet" href="css/marketplace.css">
  <style>
    body { font-family: 'Inter', 'Noto Sans Thai', sans-serif; }

    /* Gradient logo text */
    .logo-gradient {
      background: linear-gradient(135deg, #6366f1, #8b5cf6);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    /* Navbar active/hover underline */
    .nav-link-pill {
      transition: background 0.15s, color 0.15s;
    }
    .nav-link-pill:hover {
      background: #f1f0ff;
      color: #6366f1;
    }

    /* Mobile bottom nav active */
    .bottom-nav-item.active i,
    .bottom-nav-item.active span {
      color: #6366f1;
    }

    /* Spinner for loading state */
    @keyframes spin {
      to { transform: rotate(360deg); }
    }
    .kp-spinner {
      width: 2.5rem;
      height: 2.5rem;
      border: 3px solid #e0e7ff;
      border-top-color: #6366f1;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }
  </style>
</head>
<body class="bg-gray-50 min-h-screen">

  <!-- ===== NAVBAR ===== -->
  <nav class="sticky top-0 z-50 bg-white/90 backdrop-blur border-b border-gray-200 shadow-sm">
    <div class="max-w-7xl mx-auto px-4 flex items-center justify-between h-14">

      <!-- Logo -->
      <a href="/" class="flex items-center gap-2 no-underline shrink-0">
        <span class="inline-flex items-center justify-center w-8 h-8 rounded-lg text-white text-sm font-bold"
              style="background: linear-gradient(135deg, #6366f1, #8b5cf6);">KP</span>
        <span class="font-semibold text-gray-800 hidden sm:inline">Marketplace</span>
      </a>

      <!-- Desktop nav links -->
      <div class="hidden md:flex items-center gap-1 text-sm font-medium text-gray-600">
        <a href="/marketplace.html"
           class="nav-link-pill flex items-center gap-1.5 px-3 py-1.5 rounded-lg no-underline">
          <i data-lucide="store" class="w-4 h-4"></i> Marketplace
        </a>
        <a href="/"
           class="nav-link-pill flex items-center gap-1.5 px-3 py-1.5 rounded-lg no-underline">
          <i data-lucide="wand-2" class="w-4 h-4"></i> สร้าง Prompt
        </a>

        <!-- Guest links -->
        <span class="auth-links flex items-center gap-1 ml-2">
          <a href="/auth.html"
             class="flex items-center gap-1.5 px-4 py-1.5 rounded-lg bg-indigo-600 text-white hover:bg-indigo-700 transition no-underline text-sm font-medium">
            <i data-lucide="log-in" class="w-4 h-4"></i> เข้าสู่ระบบ
          </a>
        </span>

        <!-- Logged-in user menu -->
        <span class="user-menu hidden items-center gap-1 ml-2">
          <div class="w-px h-5 bg-gray-200 mx-1"></div>
          <a href="/topup.html"
             class="nav-link-pill flex items-center gap-1.5 px-3 py-1.5 rounded-lg no-underline text-indigo-600 font-semibold">
            <i data-lucide="wallet" class="w-4 h-4"></i>
            <span class="user-balance">฿0</span>
          </a>
          <a href="/orders.html"
             class="nav-link-pill flex items-center gap-1.5 px-3 py-1.5 rounded-lg no-underline">
            <i data-lucide="shopping-bag" class="w-4 h-4"></i> คำสั่งซื้อ
          </a>
          <a href="/dashboard.html"
             class="seller-only nav-link-pill flex items-center gap-1.5 px-3 py-1.5 rounded-lg no-underline">
            <i data-lucide="layout-dashboard" class="w-4 h-4"></i> Dashboard
          </a>
          <a href="/admin.html"
             class="admin-only nav-link-pill flex items-center gap-1.5 px-3 py-1.5 rounded-lg no-underline text-rose-600">
            <i data-lucide="shield" class="w-4 h-4"></i> Admin
          </a>
          <div class="w-px h-5 bg-gray-200 mx-1"></div>
          <a href="/account.html"
             class="nav-link-pill flex items-center gap-1.5 px-3 py-1.5 rounded-lg no-underline">
            <i data-lucide="user-circle" class="w-4 h-4"></i>
            <span class="user-display-name text-gray-700"></span>
          </a>
          <a href="#" onclick="logout()"
             class="nav-link-pill flex items-center gap-1.5 px-2 py-1.5 rounded-lg no-underline text-gray-400 hover:text-rose-500">
            <i data-lucide="log-out" class="w-4 h-4"></i>
          </a>
        </span>
      </div>

      <!-- Mobile: wallet balance + hamburger -->
      <div class="flex md:hidden items-center gap-2">
        <span class="user-menu hidden items-center">
          <a href="/topup.html"
             class="flex items-center gap-1 text-indigo-600 font-semibold text-sm no-underline px-2">
            <i data-lucide="wallet" class="w-4 h-4"></i>
            <span class="user-balance">฿0</span>
          </a>
        </span>
        <span class="auth-links">
          <a href="/auth.html"
             class="flex items-center gap-1 px-3 py-1.5 rounded-lg bg-indigo-600 text-white text-sm font-medium no-underline">
            <i data-lucide="log-in" class="w-4 h-4"></i>
          </a>
        </span>
        <button id="hamburger-btn" aria-label="เมนู"
                class="p-2 rounded-lg text-gray-500 hover:bg-gray-100 transition">
          <i data-lucide="menu" class="w-5 h-5"></i>
        </button>
      </div>
    </div>

    <!-- Mobile drawer -->
    <div id="mobile-menu"
         class="hidden md:hidden border-t border-gray-100 bg-white px-4 py-3 flex flex-col gap-1 text-sm font-medium text-gray-600">
      <a href="/marketplace.html"
         class="flex items-center gap-2 px-3 py-2 rounded-lg hover:bg-gray-50 no-underline">
        <i data-lucide="store" class="w-4 h-4"></i> Marketplace
      </a>
      <a href="/"
         class="flex items-center gap-2 px-3 py-2 rounded-lg hover:bg-gray-50 no-underline">
        <i data-lucide="wand-2" class="w-4 h-4"></i> สร้าง Prompt
      </a>
      <div class="auth-links">
        <a href="/auth.html"
           class="flex items-center gap-2 px-3 py-2 rounded-lg hover:bg-gray-50 no-underline">
          <i data-lucide="log-in" class="w-4 h-4"></i> เข้าสู่ระบบ
        </a>
      </div>
      <div class="user-menu hidden flex-col gap-1">
        <div class="h-px bg-gray-100 my-1"></div>
        <a href="/orders.html"
           class="flex items-center gap-2 px-3 py-2 rounded-lg hover:bg-gray-50 no-underline">
          <i data-lucide="shopping-bag" class="w-4 h-4"></i> คำสั่งซื้อ
        </a>
        <a href="/dashboard.html"
           class="seller-only flex items-center gap-2 px-3 py-2 rounded-lg hover:bg-gray-50 no-underline">
          <i data-lucide="layout-dashboard" class="w-4 h-4"></i> Dashboard
        </a>
        <a href="/admin.html"
           class="admin-only flex items-center gap-2 px-3 py-2 rounded-lg hover:bg-gray-50 no-underline text-rose-600">
          <i data-lucide="shield" class="w-4 h-4"></i> Admin
        </a>
        <div class="h-px bg-gray-100 my-1"></div>
        <a href="/account.html"
           class="flex items-center gap-2 px-3 py-2 rounded-lg hover:bg-gray-50 no-underline">
          <i data-lucide="user-circle" class="w-4 h-4"></i> บัญชีของฉัน
        </a>
        <a href="#" onclick="logout()"
           class="flex items-center gap-2 px-3 py-2 rounded-lg hover:bg-gray-50 no-underline text-rose-500">
          <i data-lucide="log-out" class="w-4 h-4"></i> ออกจากระบบ
        </a>
      </div>
    </div>
  </nav>

  <!-- ===== MAIN CONTENT ===== -->
  <main class="max-w-5xl mx-auto px-4 py-8 pb-24 md:pb-10">

    <!-- Back link -->
    <a href="/marketplace.html"
       class="inline-flex items-center gap-1.5 text-sm text-gray-500 hover:text-indigo-600 transition mb-6 no-underline group">
      <i data-lucide="arrow-left" class="w-4 h-4 group-hover:-translate-x-0.5 transition-transform"></i>
      กลับไป Marketplace
    </a>

    <!-- JS-populated detail area -->
    <div id="prompt-detail">
      <!-- Loading placeholder -->
      <div class="flex flex-col items-center justify-center py-24 text-gray-400 gap-4">
        <div class="kp-spinner"></div>
        <span class="text-sm">กำลังโหลดข้อมูล...</span>
      </div>
    </div>

  </main>

  <!-- ===== BOTTOM NAV (mobile only) ===== -->
  <nav class="fixed bottom-0 left-0 right-0 z-40 flex md:hidden bg-white border-t border-gray-200 shadow-lg">
    <a href="/marketplace.html"
       class="bottom-nav-item flex flex-col items-center justify-center flex-1 py-2 gap-0.5 text-gray-500 hover:text-indigo-600 transition no-underline text-xs">
      <i data-lucide="store" class="w-5 h-5"></i>
      <span>Marketplace</span>
    </a>
    <a href="/"
       class="bottom-nav-item flex flex-col items-center justify-center flex-1 py-2 gap-0.5 text-gray-500 hover:text-indigo-600 transition no-underline text-xs">
      <i data-lucide="wand-2" class="w-5 h-5"></i>
      <span>สร้าง</span>
    </a>
    <a href="/orders.html"
       class="bottom-nav-item user-menu hidden flex-col items-center justify-center flex-1 py-2 gap-0.5 text-gray-500 hover:text-indigo-600 transition no-underline text-xs">
      <i data-lucide="shopping-bag" class="w-5 h-5"></i>
      <span>คำสั่งซื้อ</span>
    </a>
    <a href="/topup.html"
       class="bottom-nav-item user-menu hidden flex-col items-center justify-center flex-1 py-2 gap-0.5 text-gray-500 hover:text-indigo-600 transition no-underline text-xs">
      <i data-lucide="wallet" class="w-5 h-5"></i>
      <span>เติมเครดิต</span>
    </a>
    <a href="/auth.html"
       class="bottom-nav-item auth-links flex flex-col items-center justify-center flex-1 py-2 gap-0.5 text-gray-500 hover:text-indigo-600 transition no-underline text-xs">
      <i data-lucide="log-in" class="w-5 h-5"></i>
      <span>เข้าสู่ระบบ</span>
    </a>
    <a href="/account.html"
       class="bottom-nav-item user-menu hidden flex-col items-center justify-center flex-1 py-2 gap-0.5 text-gray-500 hover:text-indigo-600 transition no-underline text-xs">
      <i data-lucide="user-circle" class="w-5 h-5"></i>
      <span>บัญชี</span>
    </a>
  </nav>

  <!-- ===== SCRIPTS ===== -->
  <script>
    // Init Lucide icons
    lucide.createIcons();

    // Hamburger toggle
    const hamburgerBtn = document.getElementById('hamburger-btn');
    const mobileMenu   = document.getElementById('mobile-menu');
    if (hamburgerBtn && mobileMenu) {
      hamburgerBtn.addEventListener('click', () => {
        mobileMenu.classList.toggle('hidden');
        mobileMenu.classList.toggle('flex');
      });
    }
  </script>
  <script src="js/marketplace.js"></script>
</body>
</html>
